{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="flex justify-center items-center min-h-[60vh]">
  <div class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body">
      <h2 class="card-title text-2xl justify-center mb-4">{% trans "Sign In" %}</h2>

      <form method="post" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
        {% csrf_token %}

        <div class="form-control mb-4">
          <label class="label" for="email">
            <span class="label-text">{% trans "Email" %}</span>
          </label>
          <input type="email" id="email" name="email" required
                 class="input input-bordered w-full"
                 placeholder="you@example.com" autocomplete="email" />
        </div>

        <div class="form-control mb-6">
          <label class="label" for="password">
            <span class="label-text">{% trans "Password" %}</span>
          </label>
          <input type="password" id="password" name="password" required
                 class="input input-bordered w-full"
                 autocomplete="current-password" />
        </div>

        <button type="submit" class="btn btn-primary w-full">{% trans "Sign In" %}</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
