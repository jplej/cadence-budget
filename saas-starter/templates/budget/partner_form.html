{% extends "base.html" %}
{% load i18n %}
{% block nav_partners %}active{% endblock %}

{% block content %}
<div class="max-w-lg">
  <div class="flex items-center gap-3 mb-6">
    <a href="{% url 'list_partners' %}" class="btn btn-ghost btn-sm btn-square">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <h1 class="text-2xl font-bold">{% trans "Edit Partner" %}</h1>
  </div>

  <div class="card bg-base-100 shadow">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        {% if error %}
          <div role="alert" class="alert alert-error mb-4">
            <span>{{ error }}</span>
          </div>
        {% endif %}

        <div class="form-control mb-3">
          <label class="label" for="name"><span class="label-text font-medium">{% trans "Name" %} *</span></label>
          <input id="name" name="name" type="text" class="input input-bordered" value="{{ partner.name }}" required />
        </div>

        <div class="form-control mb-4">
          <label class="label cursor-pointer justify-start gap-3">
            <input name="is_internal" type="checkbox" class="checkbox checkbox-sm" {% if partner.is_internal %}checked{% endif %} />
            <span class="label-text">{% trans "Internal (our organization)" %}</span>
          </label>
        </div>

        <div class="divider text-xs opacity-50">{% trans "Contact (optional)" %}</div>

        <div class="form-control mb-3">
          <label class="label" for="contact_name"><span class="label-text">{% trans "Contact name" %}</span></label>
          <input id="contact_name" name="contact_name" type="text" class="input input-bordered input-sm" value="{{ partner.contact_name }}" />
        </div>
        <div class="grid grid-cols-2 gap-3 mb-6">
          <div class="form-control">
            <label class="label" for="contact_email"><span class="label-text">{% trans "Email" %}</span></label>
            <input id="contact_email" name="contact_email" type="email" class="input input-bordered input-sm" value="{{ partner.contact_email }}" />
          </div>
          <div class="form-control">
            <label class="label" for="contact_phone"><span class="label-text">{% trans "Phone" %}</span></label>
            <input id="contact_phone" name="contact_phone" type="tel" class="input input-bordered input-sm" value="{{ partner.contact_phone }}" />
          </div>
        </div>

        <div class="flex gap-3">
          <button type="submit" class="btn btn-primary">{% trans "Save" %}</button>
          <a href="{% url 'list_partners' %}" class="btn btn-ghost">{% trans "Cancel" %}</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
