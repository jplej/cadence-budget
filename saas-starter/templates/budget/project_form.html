{% extends "base.html" %}
{% load i18n %}
{% block nav_projects %}active{% endblock %}

{% block content %}
<div class="max-w-lg">
  <div class="flex items-center gap-3 mb-6">
    <a href="{% url 'list_projects' %}" class="btn btn-ghost btn-sm btn-square">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <h1 class="text-2xl font-bold">{{ title }}</h1>
  </div>

  <div class="card bg-base-100 shadow">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        {% if error %}
          <div role="alert" class="alert alert-error mb-4">
            <span>{{ error }}</span>
          </div>
        {% endif %}

        <div class="form-control mb-3">
          <label class="label" for="name"><span class="label-text font-medium">{% trans "Name" %} *</span></label>
          <input id="name" name="name" type="text" class="input input-bordered"
            value="{{ project.name|default:'' }}" required autofocus />
        </div>

        <div class="form-control mb-3">
          <label class="label" for="description"><span class="label-text">{% trans "Description" %}</span></label>
          <textarea id="description" name="description" class="textarea textarea-bordered" rows="3">{{ project.description|default:'' }}</textarea>
        </div>

        <div class="form-control mb-6">
          <label class="label" for="tags">
            <span class="label-text">{% trans "Tags" %}</span>
            <span class="label-text-alt text-base-content/40">{% trans "e.g. year/2025, type/spectacle" %}</span>
          </label>
          <input id="tags" name="tags" type="text" class="input input-bordered input-sm font-mono"
            value="{{ tags_value }}" placeholder="year/2025, type/spectacle" />
        </div>

        <div class="flex gap-3">
          <button type="submit" class="btn btn-primary">{% trans "Save" %}</button>
          <a href="{% url 'list_projects' %}" class="btn btn-ghost">{% trans "Cancel" %}</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
