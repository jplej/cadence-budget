{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="hero min-h-[60vh]">
  <div class="hero-content text-center">
    <div class="max-w-md">
      <h1 class="text-5xl font-bold">{% trans "Home" %}</h1>
      <p class="py-6 text-base-content/70">{% trans "Welcome to your tenant workspace." %}</p>
      {% if user.is_authenticated %}
        <a href="{% url 'dashboard' %}" class="btn btn-primary">{% trans "Go to Dashboard" %}</a>
      {% else %}
        <a href="{% url 'login' %}" class="btn btn-primary">{% trans "Sign In" %}</a>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
